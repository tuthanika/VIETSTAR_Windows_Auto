name: Aria2 download and rclone upload

on:
  workflow_dispatch:

jobs:
  run-download-upload:
    runs-on: windows-latest

    env:
      GH_PAT: ${{ secrets.GH_PAT }}
      INSTALL_PATH: C:\INSTALL
      SCRIPT_PATH: C:\RUN
      DOWNLOAD_DIR: C:\ATP
      REPO_PATH: ${{ github.workspace }}
      RCLONE_CONF_REPO: ${{ vars.RCLONE_CONF_REPO || 'github.com/tuthanika/Rclone-Auto-Refresh-Token' }}
      RCLONE_CONFIG_PATH: ${{ vars.RCLONE_CONFIG_PATH || 'C:\RUN\rclone.conf' }}
      REMOTE_NAME: ${{ vars.REMOTE_NAME || 'OD_APP-C03-vietstar' }}
      REMOTE_TARGET: ${{ vars.REMOTE_TARGET || 'z.ISO' }}
      RCLONE_FLAG: ${{ vars.RCLONE_FLAG || '--fast-list --delete-during --checksum --no-update-modtime --transfers 8 --checkers 8 --contimeout 60s --timeout 300s --retries 3 --low-level-retries 10 --fast-list --onedrive-delta --server-side-across-configs --onedrive-no-versions --onedrive-hard-delete --onedrive-av-override --drive-copy-shortcut-content --drive-acknowledge-abuse --drive-stop-on-upload-limit --drive-stop-on-download-limit --checksum --track-renames --no-update-modtime' }}

      ARIA2_OPTS: "--allow-overwrite=true --continue=true --max-concurrent-downloads=4 --split=16 --min-split-size=10M --retry-wait=10 --max-tries=0 --check-certificate=false --file-allocation=none"
      
      FILE_CODE_RULES: |
        [
          { "Pattern": "*windows*xp",      "Folder": "Windows XP" },
          { "Pattern": "*windows*vista",   "Folder": "Windows Vista" },
          { "Pattern": "*windows*8.1",     "Folder": "Windows 8" },
          { "Pattern": "*windows*8",       "Folder": "Windows 8" },
          { "Pattern": "*windows*10*ltsc", "Folder": "Windows 10 LTSC" },
          { "Pattern": "*windows*10*ltsb", "Folder": "Windows 10 LTSC" },
          { "Pattern": "*windows*11*ltsc", "Folder": "Windows 11 LTSC" },
          { "Pattern": "*windows*11",      "Folder": "Windows 11" },
          { "Pattern": "*windows*10",      "Folder": "Windows 10" },
          { "Pattern": "*windows*7",       "Folder": "Windows 7" }
        ]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Tạo thư mục làm việc
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "$env:INSTALL_PATH" -Force | Out-Null
          New-Item -ItemType Directory -Path "$env:SCRIPT_PATH" -Force | Out-Null
          New-Item -ItemType Directory -Path "$env:DOWNLOAD_DIR" -Force | Out-Null

      - name: Cài đặt PHP CLI
        shell: pwsh
        run: |
          choco install php --version=8.2.13 -y
          php -v
          
      - name: Cài đặt aria2
        shell: pwsh
        run: |
          $ariaZip = "$env:INSTALL_PATH\aria2.zip"
          Invoke-WebRequest -Uri "https://github.com/aria2/aria2/releases/download/release-1.36.0/aria2-1.36.0-win-64bit-build1.zip" -OutFile $ariaZip
          Expand-Archive -Path $ariaZip -DestinationPath "$env:INSTALL_PATH\aria2" -Force
          $ariaExe = Get-ChildItem "$env:INSTALL_PATH\aria2" -Recurse -Filter "aria2c.exe" | Select-Object -First 1
          Copy-Item $ariaExe.FullName "$env:SCRIPT_PATH\aria2c.exe" -Force
          & "$env:SCRIPT_PATH\aria2c.exe" -v

      - name: Cài đặt rclone
        shell: pwsh
        run: |
          $zip = "$env:INSTALL_PATH\rclone.zip"
          Invoke-WebRequest -Uri "https://downloads.rclone.org/rclone-current-windows-amd64.zip" -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath "$env:INSTALL_PATH\rclone" -Force
          $rcloneExe = Get-ChildItem "$env:INSTALL_PATH\rclone" -Recurse -Filter "rclone.exe" | Select-Object -First 1
          Copy-Item $rcloneExe.FullName "$env:SCRIPT_PATH\rclone.exe" -Force
          & "$env:SCRIPT_PATH\rclone.exe" version

      - name: Tải rclone.conf trực tiếp từ GitHub
        shell: cmd
        run: |
          curl -H "Authorization: token %GH_PAT%" ^
               -L -o "%RCLONE_CONFIG_PATH%" ^
               https://raw.githubusercontent.com/tuthanika/Rclone-Auto-Refresh-Token/main/rclone.conf


      - name: Parse link bằng PHP CLI
        shell: pwsh
        run: |
          $out = "$env:SCRIPT_PATH\links.final.txt"
          Remove-Item $out -ErrorAction Ignore
          foreach ($link in Get-Content ".\link.txt") {
            $result = & php ".\downloader.php" $link
            $result -split "`n" | ForEach-Object {
              $line = $_.Trim()
              if ($line) { Add-Content -Path $out -Value $line }
            }
          }
          Write-Host "Danh sách link trực tiếp:"
          Get-Content $out

      - name: Phân loại và xử lý ISO
        shell: pwsh
        run: |
          $links = Get-Content "$env:SCRIPT_PATH\links.final.txt"

          foreach ($link in $links) {
            $fileA = [System.IO.Path]::GetFileName($link)

            $json = & "$env:REPO_PATH\loc-iso.ps1" -Mode auto -FileNameA $fileA
            if ([string]::IsNullOrWhiteSpace($json)) {
              Write-Host "DEBUG: Không nhận được JSON cho $fileA"
              continue
            }

            $info = $json | ConvertFrom-Json
            $remoteDir = "${env:REMOTE_NAME}:${env:REMOTE_TARGET}/$($info.folder)"
            $oldDir = "$remoteDir/old"

            switch ($info.status) {
              "no_rule" {
                Write-Host "DEBUG: Không phân loại được rule cho '$fileA' → bỏ qua"
                continue
              }
              "exists" {
                Write-Host "DEBUG: Bỏ qua $fileA (đã có bản khớp key trong $remoteDir)"
                continue
              }
              "upload" {
                # Nếu có danh sách cần xoá
                if ($info.filenameB_delete) {
                  foreach ($del in $info.filenameB_delete -split '\|') {
                    if ([string]::IsNullOrWhiteSpace($del)) { continue }
                    Write-Host "DEBUG: Xóa file cũ '$del' trong $oldDir (giữ mức MAX_FILE)"
                    & "$env:SCRIPT_PATH\rclone.exe" deletefile "$oldDir/$del" --config "$env:RCLONE_CONFIG_PATH"
                  }
                }

                # Di chuyển bản hiện tại nếu có
                if ($info.filenameB) {
                  & "$env:SCRIPT_PATH\rclone.exe" mkdir "$oldDir" --config "$env:RCLONE_CONFIG_PATH" | Out-Null
                  Write-Host "DEBUG: Di chuyển bản cũ '$($info.filenameB)' vào $oldDir"
                  & "$env:SCRIPT_PATH\rclone.exe" moveto "$remoteDir/$($info.filenameB)" "$oldDir/$($info.filenameB)" --config "$env:RCLONE_CONFIG_PATH"
                }

                # Upload file A
                $opts = $env:ARIA2_OPTS -split '\s+'
                $dbgA = "$env:SCRIPT_PATH\aria2c.exe --dir=`"$env:DOWNLOAD_DIR`" --out=`"$fileA`" " + ($opts -join ' ') + " $link"
                Write-Host "DEBUG aria2c command: $dbgA"
                & "$env:SCRIPT_PATH\aria2c.exe" --dir="$env:DOWNLOAD_DIR" --out="$fileA" @opts $link

                $localFile = "$env:DOWNLOAD_DIR\$fileA"
                if (-not (Test-Path $localFile)) { Write-Error "Tải thất bại: không thấy $localFile"; exit 1 }

                $flags = $env:RCLONE_FLAG -split '\s+'
                Write-Host "Uploading $(Resolve-Path $localFile) to $remoteDir..."
                Write-Host "DEBUG flags: $($flags -join ' | ')"

                $dbgR = "$env:SCRIPT_PATH\rclone.exe copy `"$localFile`" `"$remoteDir`" --config `"$env:RCLONE_CONFIG_PATH`" " + ($flags -join ' ') + " --progress"
                Write-Host "DEBUG rclone command: $dbgR"

                & "$env:SCRIPT_PATH\rclone.exe" copy `
                  "$(Resolve-Path $localFile)" `
                  "$remoteDir" `
                  --config "$env:RCLONE_CONFIG_PATH" `
                  @flags `
                  --progress

                Remove-Item "$localFile" -Force
                Write-Host "Đã upload và xóa local: $fileA"
              }
            }
          }
