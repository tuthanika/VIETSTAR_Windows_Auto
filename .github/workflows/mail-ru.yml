name: Mailru download via Selenium + aria2c (Windows)

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: windows-latest

    steps:
      - name: Prepare workspace
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path C:\ATP | Out-Null
          Write-Host "Workspace prepared at C:\ATP"

      - name: Install aria2 (Chocolatey)
        shell: pwsh
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force
          iex ((New-Object System.Net.WebClient).DownloadString('https://chocolatey.org/install.ps1'))
          choco install aria2 -y
          aria2c --version

      - name: Download Chrome for Testing (Stable) and matching Chromedriver
        shell: pwsh
        run: |
          $api = "https://googlechromelabs.github.io/chrome-for-testing/last-known-good-versions-with-downloads.json"
          $json = Invoke-RestMethod -Uri $api
          $stable = $json.channels.stable
          $version = $stable.version
          Write-Host "Stable version: $version"

          $chromeZipUrl = ($stable.downloads.chrome | Where-Object { $_.platform -eq "win64" }).url
          $driverZipUrl = ($stable.downloads.chromedriver | Where-Object { $_.platform -eq "win64" }).url

          Write-Host "Chrome zip: $chromeZipUrl"
          Write-Host "Driver zip: $driverZipUrl"

          $chromeZip = "C:\ATP\chrome-win64.zip"
          $driverZip = "C:\ATP\chromedriver-win64.zip"
          Invoke-WebRequest -Uri $chromeZipUrl -OutFile $chromeZip
          Invoke-WebRequest -Uri $driverZipUrl -OutFile $driverZip

          Expand-Archive -Path $chromeZip -DestinationPath C:\ATP -Force
          Expand-Archive -Path $driverZip -DestinationPath C:\ATP -Force

          $chromeExe = Get-ChildItem -Path "C:\ATP\chrome-win64\chrome.exe" -ErrorAction Stop
          $driverExe = Get-ChildItem -Path "C:\ATP\chromedriver-win64\chromedriver.exe" -ErrorAction Stop

          Write-Host "Chrome path: $($chromeExe.FullName)"
          Write-Host "Driver path: $($driverExe.FullName)"

          # Xuất đường dẫn vào biến môi trường cho bước sau
          echo "CHROME_PATH=$($chromeExe.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "CHROMEDRIVER_PATH=$($driverExe.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install Python and Selenium
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Pip install selenium
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install selenium

      - name: Create Python script to capture Mail.ru final download URL
        shell: pwsh
        run: |
          $script = @"
          import json, time, sys
          from selenium import webdriver
          from selenium.webdriver.common.by import By
          from selenium.webdriver.chrome.service import Service
          from selenium.webdriver.support.ui import WebDriverWait
          from selenium.webdriver.support import expected_conditions as EC

          URL = "https://cloud.mail.ru/public/AdY8/ADm5sBtux"
          CHROME_PATH = r"${env:CHROME_PATH}"
          DRIVER_PATH = r"${env:CHROMEDRIVER_PATH}"
          OUT_FILE = r"C:\ATP\download_url.txt"

          def build_driver():
              options = webdriver.ChromeOptions()
              options.binary_location = CHROME_PATH
              # Headless ổn định trên runner
              options.add_argument("--headless=new")
              options.add_argument("--no-sandbox")
              options.add_argument("--disable-dev-shm-usage")
              options.add_argument("--disable-gpu")
              options.set_capability("goog:loggingPrefs", {"performance": "ALL"})
              service = Service(DRIVER_PATH)
              driver = webdriver.Chrome(service=service, options=options)
              driver.set_page_load_timeout(120)
              return driver

          def click_download(driver):
              wait = WebDriverWait(driver, 30)
              # Đợi nút tải xuất hiện theo các selector phổ biến
              selectors = [
                  "//*[@data-name='download']",
                  "//button[contains(@title,'Скачать') or contains(.,'Скачать') or contains(.,'Download')]",
                  "//span[contains(.,'Скачать')]/ancestor::button",
                  "//div[contains(@class,'toolbar') or contains(@class,'header')]//button[contains(.,'Скачать') or contains(.,'Download')]",
              ]
              for xp in selectors:
                  try:
                      btn = wait.until(EC.element_to_be_clickable((By.XPATH, xp)))
                      driver.execute_script("arguments[0].scrollIntoView({block:'center'});", btn)
                      btn.click()
                      return True
                  except Exception:
                      continue
              # Fallback JS
              js_selectors = [
                  "[data-name='download']",
                  "button[title*='Скачать']",
                  "button[aria-label*='Скачать']",
              ]
              for sel in js_selectors:
                  try:
                      el = driver.execute_script("return document.querySelector(arguments[0]);", sel)
                      if el:
                          driver.execute_script("arguments[0].scrollIntoView({block:'center'});", el)
                          driver.execute_script("arguments[0].click();", el)
                          return True
                  except Exception:
                      pass
              return False

          def extract_download_url(driver):
              # chờ request phát sinh
              time.sleep(6)
              logs = driver.get_log("performance")

              # Ưu tiên bắt theo pattern datacloudmail.ru/public/get
              for entry in logs:
                  msg = json.loads(entry["message"])["message"]
                  if msg.get("method") == "Network.responseReceived":
                      url = msg["params"]["response"].get("url","")
                      if "datacloudmail.ru/public/get" in url:
                          return url

              # Fallback nhìn cả requestWillBeSent
              for entry in logs:
                  msg = json.loads(entry["message"])["message"]
                  if msg.get("method") in ("Network.requestWillBeSent","Network.responseReceived"):
                      url = msg.get("params",{}).get("request",{}).get("url") or msg.get("params",{}).get("response",{}).get("url")
                      if url and "datacloudmail.ru/public/get" in url:
                          return url
              return None

          def main():
              driver = build_driver()
              try:
                  driver.get(URL)
                  ok = click_download(driver)
                  if not ok:
                      raise RuntimeError("Không tìm thấy/không click được nút Tải xuống.")
                  dl = extract_download_url(driver)
                  if not dl:
                      raise RuntimeError("Không bắt được link tải trong network logs.")
                  with open(OUT_FILE, "w", encoding="utf-8") as f:
                      f.write(dl.strip()+"\n")
                  print("Captured:", dl)
              finally:
                  driver.quit()

          if __name__ == "__main__":
              main()
          "@

          Set-Content -Path C:\ATP\capture_mailru.py -Value $script -Encoding UTF8
          Write-Host "Python script written to C:\ATP\capture_mailru.py"

      - name: Run capture script
        shell: pwsh
        run: |
          python C:\ATP\capture_mailru.py
          Write-Host "Captured URL file contents:"
          Get-Content C:\ATP\download_url.txt

      - name: Download via aria2c to C:\ATP
        shell: pwsh
        run: |
          $url = Get-Content C:\ATP\download_url.txt | Select-Object -First 1
          if (-not $url) { throw "No URL captured." }
          Write-Host "Downloading: $url"
          # Cho phép nhiều kết nối để tăng tốc
          aria2c -x16 -s16 --dir "C:\ATP" "$url"

      - name: List files in C:\ATP
        shell: pwsh
        run: |
          Write-Host "Files in C:\ATP:"
          Get-ChildItem -Path C:\ATP -Force | Format-Table Name, Length, LastWriteTime
